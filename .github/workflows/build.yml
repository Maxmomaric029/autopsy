name: Build

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Build Release x64
      run: msbuild autopsy.vcxproj /p:Configuration=Release /p:Platform=x64 /p:WholeProgramOptimization=false /m

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: autopsy.exe
        path: Build/autopsy.exe
